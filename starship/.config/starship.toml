[os]
disabled = false
style = "bg:red fg:text"
format = "[ $symbol ]($style)"

[os.symbols]
Arch = "󰹞"
Debian = "\U000f0e52"
Fedora = "\U000f0e5e"
Linux = ""
Macos = ""
Manjaro = ""
NixOS = "\U000f1105"
Ubuntu = ""
Windows = "󰕰"

[directory]
style = "bg:orange fg:text"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Projects" = " "

[git_branch]
symbol = ""
style = "bg:yellow fg:text"
format = '[$symbol $branch ]($style)'

[git_status]
style = "bg:yellow fg:text"
format = '[$all_status$ahead_behind ]($style)'

[c]
symbol = ""
style = "bg:green fg:text"
format = '[$symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:green fg:text"
format = '[$symbol ($version) ]($style)'

[nodejs]
symbol = "󰎙"
style = "bg:green fg:text"
format = '[$symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:green fg:text"
format = '[$symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:green fg:text"
format = '[$symbol ($version) ]($style)'

[java]
symbol = ""
style = "bg:green fg:text"
format = '[$symbol ($version) ]($style)'

[docker_context]
symbol = ""
style = "bg:green fg:text"
format = '[$symbol $context ]($style)'

[time]
disabled = false
style = "bg:blue fg:text"
time_format = "%H:%M"
format = '[ 󰥔 $time ]($style)'

[cmd_duration]
min_time = 1
style = "bg:violet fg:text"
format = '[󰔔 $duration ]($style)'
show_milliseconds = true

[character]
success_symbol = '[ 󱞩](bold green)'
error_symbol = '[ 󱞩](bold red)'
