# Starship prompt config - Pastel Powerline
# https://starship.rs/config/

palette = "pastel"

format = """
[](red)\
$os\
[](fg:red bg:orange)\
$directory\
[](fg:orange bg:yellow)\
[ ](bg:yellow)\
$git_branch\
$git_status\
[](fg:yellow bg:green)\
[ ](bg:green)\
$c\
$golang\
$nodejs\
$python\
$rust\
$java\
$docker_context\
[](fg:green bg:blue)\
$time\
[](fg:blue bg:violet)\
[ ](bg:violet)\
$cmd_duration\
[](fg:violet) \
$character\
"""

# =============================================================================
# Color Schemes — change palette above to switch, format stays the same
# =============================================================================

# Slot names (red, orange, yellow, green, blue, violet) are just segment
# positions — they don't have to be those actual colors!

